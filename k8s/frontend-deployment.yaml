apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: portfolio-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: REPLACE_ME
          ports:
            - containerPort: 80
