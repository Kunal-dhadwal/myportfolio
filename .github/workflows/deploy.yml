name: CI/CD — Build, Push, Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE=${{ secrets.DOCKERHUB_REPO_BACKEND }}:${{ env.IMAGE_TAG }}
          docker buildx build --platform linux/amd64 -t $BACKEND_IMAGE ./backend --push

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE=${{ secrets.DOCKERHUB_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}
          docker buildx build --platform linux/amd64 -t $FRONTEND_IMAGE ./frontend --push

      - name: Prepare kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 -d > kubeconfig
          chmod 600 kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" > kubeconf.env

      - name: Apply k8s manifests
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
          NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/cert-issuer.yaml || true
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/backend-deployment.yaml

      - name: Update deployments with new images
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
          BACKEND_IMAGE: ${{ secrets.DOCKERHUB_REPO_BACKEND }}:${{ env.IMAGE_TAG }}
          FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}
          NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          kubectl set image deployment/backend backend=$BACKEND_IMAGE -n $NAMESPACE
          kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE -n $NAMESPACE
          kubectl rollout status deployment/backend -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=120s
